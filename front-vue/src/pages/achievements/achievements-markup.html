<main class="shell">
    <section class="panel hero">
      <div>
        <h1>成就中心</h1>
        <p>以游戏成就面板方式展示你的环保里程碑。完成识别、提升积分、解锁稀有成就。</p>
      </div>
      <div class="actions">
        <button class="btn refresh" id="refreshBtn" type="button">刷新</button>
        <button class="btn back" id="backBtn" type="button">返回首页</button>
      </div>
    </section>

    <section class="panel summary">
      <article class="rank-panel">
        <div class="ring-wrap" id="progressRing">
          <div class="ring-core">
            <div>
              <div class="rate" id="completionRate">0%</div>
              <div class="rate-sub">总体完成度</div>
            </div>
          </div>
        </div>
        <div class="rank-text" id="completionText">已解锁 0 / 0</div>
      </article>

      <article class="summary-cards">
        <div class="summary-card">
          <div class="k">已解锁成就</div>
          <div class="v" id="unlockedCount">0</div>
          <div class="s" id="unlockedHint">本次会话累计</div>
        </div>
        <div class="summary-card">
          <div class="k">总成就数</div>
          <div class="v" id="totalCount">0</div>
          <div class="s">系统定义</div>
        </div>
        <div class="summary-card">
          <div class="k">本次新解锁</div>
          <div class="v" id="newUnlockCount">0</div>
          <div class="s">来自最新识别与同步</div>
        </div>
        <div class="summary-card">
          <div class="k">当前等级</div>
          <div class="v" id="gradeText">D</div>
          <div class="s" id="updatedAt">更新时间：--</div>
        </div>
      </article>
    </section>

    <section class="panel latest">
      <div class="section-head">
        <h2>最新解锁</h2>
        <span class="section-note">按解锁时间倒序</span>
      </div>
      <div class="latest-list" id="latestUnlocks"></div>
    </section>

    <section class="panel gallery">
      <div class="section-head">
        <h2>成就图鉴</h2>
        <span class="section-note">支持按状态筛选</span>
      </div>
      <div class="filters" id="filterChips">
        <button class="filter-chip active" data-filter="all" type="button">全部</button>
        <button class="filter-chip" data-filter="unlocked" type="button">已解锁</button>
        <button class="filter-chip" data-filter="locked" type="button">未解锁</button>
      </div>
      <div class="achievement-grid" id="achievementGrid"></div>
      <div class="state" id="stateBox" style="display:none;"></div>
    </section>
  </main>

  <div class="modal-mask" id="unlockModalMask">
    <div class="modal">
      <div class="modal-head">
        <h3>新成就解锁</h3>
      </div>
      <div class="modal-body" id="unlockModalBody"></div>
      <div class="modal-foot">
        <button class="close-btn" id="closeModalBtn" type="button">知道了</button>
      </div>
    </div>
  </div>
