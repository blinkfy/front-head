<main class="screen">
    <section class="top panel">
      <div class="row">
        <div>
          <h1 class="title">垃圾清运可视化大屏</h1>
          <div class="sub">Tencent Map + 清运路径实时调度</div>
        </div>
        <div class="actions">
          <div class="clock" id="clockText">--:--:--</div>
          <div class="status" id="statusText">准备就绪</div>
          <div class="strategy" id="strategySwitch">
            <button type="button" data-strategy="shortest_distance">最短里程</button>
            <button type="button" data-strategy="shortest_time">最短时间</button>
            <button type="button" data-strategy="fewest_stops">最少停靠</button>
          </div>
          <a class="btn ghost nav-link-btn" id="toCommunityBtn" href="/community-dashboard">🏙 社区治理大屏</a>
          <button class="btn blue" id="refreshBtn">立即刷新</button>
          <button class="btn ghost" id="backBtn">返回</button>
        </div>
      </div>
      <div class="cards">
        <div class="card"><div class="k">桶位总数</div><div class="v" id="metricTotal">0</div><div class="delta" id="metricTotalDelta"></div></div>
        <div class="card"><div class="k">紧急桶位</div><div class="v" id="metricUrgent">0</div><div class="delta" id="metricUrgentDelta"></div></div>
        <div class="card"><div class="k">平均满载率</div><div class="v" id="metricAverage">0%</div><div class="delta" id="metricAverageDelta"></div></div>
        <div class="card"><div class="k">本次路线里程</div><div class="v" id="metricDistance">0 km</div><div class="delta" id="metricDistanceDelta"></div></div>
        <div class="card"><div class="k">预计完工时长</div><div class="v" id="metricDuration">0 min</div><div class="delta" id="metricDurationDelta"></div></div>
      </div>
    </section>

    <section class="main">
      <aside class="col left">
        <section class="panel block">
          <h3>风险桶位排行 <span class="note">高负载 > 临界 > 正常</span></h3>
          <div class="list" id="riskList"></div>
        </section>
        <section class="panel block">
          <h3>2小时风险预测 <span class="note">Top 6</span></h3>
          <div class="bars" id="forecastBars"></div>
        </section>
      </aside>

      <section class="col center">
        <section class="panel map-wrap">
          <div id="map"></div>
          <div class="brief" id="routeBrief"><strong>路线概览</strong><div>等待数据...</div></div>
        </section>
        <section class="panel timeline">
          <h3>清运时间轴 <span class="note">按停靠顺序展示 ETA</span></h3>
          <div class="line" id="routeTimeline"></div>
        </section>
      </section>

      <aside class="col right">
        <section class="panel block">
          <h3>实时告警流 <span class="note">单车处置闭环</span></h3>
          <div class="list" id="alertList"></div>
        </section>
        <section class="panel block">
          <h3>车辆调度明细 <span class="note">仅 1 辆清运车</span></h3>
          <div class="list" id="dispatchList"></div>
        </section>
      </aside>
    </section>
  </main>
