<main class="wrap">
  <section class="topbar">
    <div>
      <div class="title">AI 服务设置</div>
      <div class="sub">管理员可控制 AI 服务开关、识别模式（YOLO/AI）和模型参数。</div>
    </div>
    <div class="btns">
      <button class="btn" id="backBtn">返回</button>
      <button class="btn blue" id="reloadBtn">重新读取</button>
    </div>
  </section>

  <section class="card">
    <div class="card-h">
      <span>运行参数</span>
      <span id="updatedAtText" class="status"></span>
    </div>
    <div class="card-b">
      <div class="row">
        <div>
          <div class="label">AI 服务开关</div>
          <div class="desc">关闭后将禁用 AI 识别增强与 AI 对话流式接口。</div>
        </div>
        <label class="switch"><input id="aiEnabled" type="checkbox" />启用</label>
      </div>

      <div class="row">
        <div>
          <div class="label">识别模式</div>
          <div class="desc">`yolo` 优先本地 YOLO；`ai` 直接使用大模型图像识别。</div>
        </div>
        <select id="detectorMode" class="select">
          <option value="yolo">yolo（默认）</option>
          <option value="ai">ai（Qwen）</option>
        </select>
      </div>

      <div class="row">
        <div>
          <div class="label">模型名</div>
          <div class="desc">例如：`qwen3-vl-flash`。</div>
        </div>
        <input id="model" class="input" />
      </div>

      <div class="row">
        <div>
          <div class="label">3D 定位</div>
          <div class="desc">在识别结果中返回相对三维位置。</div>
        </div>
        <label class="switch"><input id="include3d" type="checkbox" />启用</label>
      </div>

      <div class="row">
        <div>
          <div class="label">Thinking 模式</div>
          <div class="desc">开启后模型可能更慢，但推理更充分。</div>
        </div>
        <label class="switch"><input id="enableThinking" type="checkbox" />启用</label>
      </div>

      <div class="row">
        <div>
          <div class="label">Thinking 预算</div>
          <div class="desc">范围 256 - 81920。</div>
        </div>
        <input id="thinkingBudget" class="input" type="number" min="256" max="81920" step="1" />
      </div>

      <div class="btns">
        <button id="saveBtn" class="btn primary">保存设置</button>
        <button id="resetBtn" class="btn warn">恢复页面默认</button>
      </div>
      <div id="statusText" class="status"></div>
    </div>
  </section>
</main>
