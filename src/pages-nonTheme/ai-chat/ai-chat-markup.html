<main class="shell">
    <aside class="sidebar" id="historySidebar">
      <div>
        <h1>AI环保助手</h1>
        <p>基于识别结果继续追问分类细节、投放规范和变废为宝方案。</p>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
      <div class="conversation-list" id="conversationList"></div>
      <p class="sidebar-footnote">会话按时间自动保存，点击左侧即可继续。</p>
    </aside>
    <button
      class="history-backdrop"
      id="historyBackdrop"
      type="button"
      aria-label="Close conversation history"
    ></button>

    <section class="chat-panel">
      <div class="chat-header">
        <button
          class="history-toggle"
          id="historyToggleBtn"
          type="button"
          aria-label="Toggle conversation history"
          aria-controls="historySidebar"
          aria-expanded="false"
        >
          <span class="history-toggle-bar"></span>
        </button>
        <div class="chat-header-main">
          <h2 class="chat-title" id="chatTitle">当前对话</h2>
          <p class="chat-subtitle" id="chatSubtitle">继续提问，AI 会结合识别结果给出更细建议。</p>
        </div>
        <button class="btn" id="backBtn">返回识别页</button>
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <div class="image-pending" id="pickedImageWrap" hidden>
          <span>已选择图片：</span>
          <span class="image-pending-name" id="pickedImageName"></span>
          <span>将随下一条消息发送</span>
          <button class="image-pending-clear" id="removeImageBtn" type="button">取消</button>
        </div>

        <textarea id="promptInput" placeholder="继续追问：比如投放细节、分类依据、可执行改造步骤…"></textarea>

        <div class="actions">
          <input id="imageInput" type="file" accept="image/*" style="display:none" />
          <button class="btn" id="pickBtn" type="button">选择图片</button>
          <button class="btn blue" id="stopBtn" type="button" disabled>ͣ停止</button>
          <button class="btn primary" id="sendBtn" type="button">发送</button>
        </div>
      </div>
    </section>
  </main>
