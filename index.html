<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分投侠</title>
    <style>
      /* 原生加载动画 - 在JS加载前显示 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg,
          #10b981 0%,
          #34d399 30%,
          #6ee7b7 60%,
          #a7f3d0 100%);
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: loadingIn 0.5s ease-out;
      }
      
      @keyframes loadingIn {
        from {
          opacity: 0;
          transform: scale(0.8) translateY(30px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      
      .loading-gif {
        width: 250px;
        height: 250px;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        animation: gifPulse 1.5s ease-in-out infinite;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.1);
      }
      
      @keyframes gifPulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      
      .loading-title {
        font-size: 28px;
        font-weight: 800;
        color: #ffffff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        letter-spacing: 4px;
        animation: titleGlow 2s ease-in-out infinite;
      }
      
      @keyframes titleGlow {
        0%, 100% {
          text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        50% {
          text-shadow: 0 2px 16px rgba(255, 255, 255, 0.5), 0 2px 8px rgba(0, 0, 0, 0.2);
        }
      }
      
      .loading-subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
        letter-spacing: 2px;
      }
      
      .loading-progress {
        width: 200px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 20px;
      }
      
      .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ffffff 0%, #d1fae5 100%);
        border-radius: 2px;
        transition: width 0.3s ease;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        animation: progressAnim 2s ease-in-out infinite;
      }
      
      @keyframes progressAnim {
        0% {
          width: 0%;
          transform: translateX(-100%);
        }
        50% {
          width: 100%;
          transform: translateX(0%);
        }
        100% {
          width: 100%;
          transform: translateX(100%);
        }
      }
      
      /* 淡出动画 */
      .loading-fade-out {
        animation: fadeOut 0.5s ease forwards;
      }
      
      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: scale(1.05);
          pointer-events: none;
        }
      }
      
      /* 备用：如果GIF加载失败，显示CSS动画 */
      .loading-spinner {
        width: 80px;
        height: 80px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- 原生加载动画容器 -->
    <div id="app-loading">
      <div class="loading-content">
        <img class="loading-gif" src="/static/moveable2.gif" alt="加载中" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'" />
        <div class="loading-spinner"></div>
        <div class="loading-title">分投侠</div>
        <div class="loading-subtitle">智能垃圾分类助手</div>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
      </div>
    </div>
    
    <div id="app"></div>
    
    <!-- Vite / uni 脚本入口：加载 src/main.js -->
    <script type="module" src="/src/main.js"></script>
    
    <script>
      // 检测框架加载完成并隐藏原生加载动画
      (function() {
        let checkCount = 0;
        const maxChecks = 100; // 最多检查10秒
        
        function checkAppLoaded() {
          checkCount++;
          
          // 检查uni-app是否加载完成
          const app = document.getElementById('app');
          const hasContent = app && (app.children.length > 0 || app.innerHTML.trim() !== '');
          
          // 检查Vue是否挂载
          const isVueMounted = app && app.__vue_app__;
          
          if (hasContent || isVueMounted || checkCount >= maxChecks) {
            hideLoading();
          } else {
            setTimeout(checkAppLoaded, 100);
          }
        }
        
        function hideLoading() {
          const loader = document.getElementById('app-loading');
          if (loader && !loader.classList.contains('loading-fade-out')) {
            loader.classList.add('loading-fade-out');
            setTimeout(function() {
              loader.style.display = 'none';
            }, 500);
          }
        }
        
        // 页面加载完成后开始检测
        if (document.readyState === 'complete') {
          setTimeout(checkAppLoaded, 500);
        } else {
          window.addEventListener('load', function() {
            setTimeout(checkAppLoaded, 500);
          });
        }
        
        // 备用：5秒后强制隐藏
        setTimeout(hideLoading, 5000);
      })();
    </script>
  </body>
</html>
